server {
  host = "0.0.0.0"
  host = ${?MAHJONG_SERVER_HOST}
  port = 8080
  port = ${?MAHJONG_SERVER_PORT}
}

champion {
  # ONNX export of the champion policy net (net D). Relative paths resolve
  # against the server's working directory (repo root in dev).
  modelPath = "rl/checkpoints/best_raw_net.onnx"
  modelPath = ${?MAHJONG_CHAMPION_MODEL}
}

db {
  url      = "jdbc:postgresql://localhost:5434/mahjong"
  url      = ${?MAHJONG_DB_URL}
  user     = "mahjong"
  user     = ${?MAHJONG_DB_USER}
  password = "mahjong"
  password = ${?MAHJONG_DB_PASSWORD}
  driver   = "org.postgresql.Driver"
  poolSize = 8
}

# game-engine settings (loaded by the existing core engine)
isPauseWhenLog: false
minScore: 3
maxScore: 10
scoreMap: {
  3:  8,
  4:  16,
  5:  24,
  6:  32,
  7:  48,
  8:  64,
  9:  96,
  10: 128
}
